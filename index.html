<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HD2 Tactical Pad</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg: #0b0c10;
            --tg-theme-secondary: #1f2833;
            --hd-yellow: #ffe81f;
            --hd-blue: #4facfe;
            --hd-white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #0b0c10);
            color: var(--tg-theme-text-color, #c5c6c7);
            margin: 0;
            padding: 10px;
            padding-bottom: 100px;
            overflow-x: hidden; /* Запрещаем горизонтальный скролл */
        }

        .header {
            text-align: center;
            border: 1px solid var(--hd-yellow);
            padding: 10px;
            margin-bottom: 15px;
            background: rgba(255, 232, 31, 0.05);
            border-radius: 8px;
        }

        .header h1 { font-size: 1rem; color: var(--hd-yellow); margin: 0; letter-spacing: 2px; }

        .category-title {
            background: #000;
            color: var(--hd-yellow);
            padding: 8px 12px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 20px;
            border-left: 4px solid var(--hd-yellow);
            border-radius: 4px;
        }

        /* КАРТОЧКА СТРАТАГЕМЫ */
        .strat-card {
            display: flex;
            align-items: center;
            background: var(--tg-theme-secondary-bg-color, #1f2833);
            margin: 8px 0;
            padding: 12px;
            border-radius: 10px;
            border-bottom: 2px solid rgba(0,0,0,0.3);
            gap: 15px;
        }

        .check-area { flex-shrink: 0; }
        
        .info-area { flex-grow: 1; overflow: hidden; }

        .strat-name {
            display: block;
            font-weight: bold;
            font-size: 1rem;
            color: #fff;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* СТРЕЛКИ ТЕПЕРЬ АДАПТИВНЫЕ */
        .arrows {
            display: flex;
            gap: 6px;
            flex-wrap: wrap; /* Если стрелок много, они перенесутся на вторую строку */
        }

        .arrows span {
            font-size: 1.6rem;
            font-weight: 900;
            line-height: 1;
        }

        .up { color: var(--hd-white); text-shadow: 0 0 5px #fff; }
        .down { color: var(--hd-blue); text-shadow: 0 0 5px var(--hd-blue); }
        .left, .right { color: var(--hd-yellow); text-shadow: 0 0 5px var(--hd-yellow); }

        .hidden { display: none; }

        /* Кастомный чекбокс для удобства пальцев */
        input[type="checkbox"] {
            width: 24px;
            height: 24px;
            accent-color: var(--hd-yellow);
        }

        .controls-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            font-size: 0.8rem;
            background: #45a29e;
            color: white;
        }
        .btn-clear { background: #c3073f; }
    </style>
</head>
<body>

<div class="header">
    <h1>TACTICAL INTERFACE v2.6</h1>
</div>

<div class="controls-top">
    <button onclick="resetFilter()">ПОКАЗАТЬ ВСЕ</button>
    <button class="btn-clear" onclick="clearAll()">ОЧИСТИТЬ</button>
</div>

<div id="content">
    <div class="category-group">
        <div class="category-title">🦅 АВИАЦИЯ «ОРЁЛ»</div>
        
        <div class="strat-card">
            <div class="check-area"><input type="checkbox" checked></div>
            <div class="info-area">
                <span class="strat-name">Авиаудар Орла</span>
                <div class="arrows"><span class="up">↑</span><span class="right">→</span><span class="down">↓</span><span class="right">→</span></div>
            </div>
        </div>

        <div class="strat-card">
            <div class="check-area"><input type="checkbox" checked></div>
            <div class="info-area">
                <span class="strat-name">500-кг бомба</span>
                <div class="arrows"><span class="up">↑</span><span class="right">→</span><span class="down">↓</span><span class="down">↓</span><span class="down">↓</span></div>
            </div>
        </div>
    </div>

    <div class="category-group">
        <div class="category-title">🛡️ ОБОРОНА</div>
        
        <div class="strat-card">
            <div class="check-area"><input type="checkbox" checked></div>
            <div class="info-area">
                <span class="strat-name">Автопушка-турель</span>
                <div class="arrows"><span class="down">↓</span><span class="up">↑</span><span class="right">→</span><span class="up">↑</span><span class="left">←</span><span class="up">↑</span></div>
            </div>
        </div>
        
        <div class="strat-card">
            <div class="check-area"><input type="checkbox" checked></div>
            <div class="info-area">
                <span class="strat-name">Гренадерский бастион</span>
                <div class="arrows"><span class="down">↓</span><span class="right">→</span><span class="down">↓</span><span class="left">←</span><span class="right">→</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    tg.MainButton.setText("ПРИМЕНИТЬ ФИЛЬТР");
    tg.MainButton.show();
    tg.MainButton.setParams({ button_color: "#ffe81f", button_text_color: "#000000" });

    tg.MainButton.onClick(() => {
        const cards = document.querySelectorAll('.strat-card');
        cards.forEach(card => {
            const isChecked = card.querySelector('input').checked;
            card.classList.toggle('hidden', !isChecked);
        });

        // Скрываем заголовки категорий, если в них нет видимых карточек
        document.querySelectorAll('.category-group').forEach(group => {
            const hasVisible = Array.from(group.querySelectorAll('.strat-card')).some(c => !c.classList.contains('hidden'));
            group.classList.toggle('hidden', !hasVisible);
        });
        
        tg.HapticFeedback.impactOccurred('heavy');
    });

    function resetFilter() {
        document.querySelectorAll('.strat-card, .category-group').forEach(el => el.classList.remove('hidden'));
        tg.HapticFeedback.impactOccurred('light');
    }

    function clearAll() {
        document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
        tg.HapticFeedback.notificationOccurred('warning');
    }
</script>

</body>
</html>
