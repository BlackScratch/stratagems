<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELLDIVERS 2 — ТАКТИЧЕСКИЙ ПЛАНШЕТ 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg: #0b0c10;
            --tg-theme-text: #c5c6c7;
            --hd-yellow: #ffe81f;
            --hd-blue: #4facfe;
            --hd-red: #c3073f;
        }

        body {
            font-family: 'Segoe UI', Impact, sans-serif;
            background-color: var(--tg-theme-bg-color, #0b0c10);
            color: var(--tg-theme-text-color, #c5c6c7);
            margin: 0;
            padding: 10px;
            padding-bottom: 80px; /* Место под кнопку TG */
            user-select: none;
        }

        /* Стиль в духе игры */
        .header { 
            text-align: center; 
            border: 2px solid var(--hd-yellow); 
            padding: 10px; 
            margin-bottom: 15px;
            background: rgba(255, 232, 31, 0.05);
        }
        .header h1 { color: var(--hd-yellow); text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: 1.2em; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            padding: 12px;
            font-weight: 900;
            border: none;
            border-radius: 8px;
            text-transform: uppercase;
            font-size: 0.8em;
        }
        .btn-reset { background-color: #45a29e; color: #fff; }
        .btn-clear { background-color: var(--hd-red); color: #fff; }

        table { width: 100%; border-collapse: collapse; background-color: rgba(31, 40, 51, 0.5); }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #000; }
        
        .category-header {
            background: #000;
            color: var(--hd-yellow);
            padding: 12px;
            font-weight: bold;
            font-size: 1em;
            text-transform: uppercase;
            border-left: 5px solid var(--hd-yellow);
        }
        
        /* ГИГАНТСКИЕ ЦВЕТНЫЕ СТРЕЛКИ */
        .arrows { 
            font-size: 1.8em; 
            font-weight: 900;
            letter-spacing: 5px; 
            white-space: nowrap;
        }

        .up { color: #ffffff; text-shadow: 0 0 8px #fff; }
        .down { color: var(--hd-blue); text-shadow: 0 0 8px var(--hd-blue); }
        .left, .right { color: var(--hd-yellow); text-shadow: 0 0 8px var(--hd-yellow); }

        .hidden { display: none; }
        .strat-name { font-size: 1em; font-weight: bold; color: #fff; display: block; }
        
        input[type="checkbox"] { transform: scale(1.8); }

        /* Адаптация под мобильные устройства */
        @media (max-width: 480px) {
            .arrows { font-size: 1.5em; letter-spacing: 3px; }
            .strat-name { font-size: 0.9em; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>COMMAND TERMINAL v2.6</h1>
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="resetFilter()">ПОКАЗАТЬ ВСЕ</button>
        <button class="btn-clear" onclick="clearAll()">ОЧИСТИТЬ</button>
    </div>

    <table id="stratTable">
        <tbody>
            <tr class="cat-row"><td colspan="3" class="category-header">🦅 АВИАЦИЯ «ОРЁЛ»</td></tr>
            <tr><td><input type="checkbox" checked></td><td><span class="strat-name">Авиаудар</span></td><td class="arrows"><span class="up">↑</span><span class="right">→</span><span class="down">↓</span><span class="right">→</span></td></tr>
            <tr><td><input type="checkbox" checked></td><td><span class="strat-name">500-кг бомба</span></td><td class="arrows"><span class="up">↑</span><span class="right">→</span><span class="down">↓</span><span class="down">↓</span><span class="down">↓</span></td></tr>
            <tr><td><input type="checkbox" checked></td><td><span class="strat-name">Напалм</span></td><td class="arrows"><span class="up">↑</span><span class="right">→</span><span class="down">↓</span><span class="up">↑</span></td></tr>

            <tr class="cat-row"><td colspan="3" class="category-header">🛰️ ОРБИТАЛЬНЫЕ УДАРЫ</td></tr>
            <tr><td><input type="checkbox" checked></td><td><span class="strat-name">Лазер</span></td><td class="arrows"><span class="right">→</span><span class="down">↓</span><span class="up">↑</span><span class="right">→</span><span class="down">↓</span></td></tr>
            <tr><td><input type="checkbox" checked></td><td><span class="strat-name">Рельсотрон</span></td><td class="arrows"><span class="right">→</span><span class="up">↑</span><span class="down">↓</span><span class="down">↓</span><span class="right">→</span></td></tr>
            <tr><td><input type="checkbox" checked></td><td><span class="strat-name">Газовый удар</span></td><td class="arrows"><span class="right">→</span><span class="right">→</span><span class="down">↓</span><span class="right">→</span></td></tr>

            <tr class="cat-row"><td colspan="3" class="category-header">🛡️ ОБОРОНА</td></tr>
            <tr><td><input type="checkbox" checked></td><td><span class="strat-name">Автопушка-турель</span></td><td class="arrows"><span class="down">↓</span><span class="up">↑</span><span class="right">→</span><span class="up">↑</span><span class="left">←</span><span class="up">↑</span></td></tr>
            <tr><td><input type="checkbox" checked></td><td><span class="strat-name">Гренадер (NEW)</span></td><td class="arrows"><span class="down">↓</span><span class="right">→</span><span class="down">↓</span><span class="left">←</span><span class="right">→</span></td></tr>

            <tr class="cat-row"><td colspan="3" class="category-header">🔫 ПОДДЕРЖКА</td></tr>
            <tr><td><input type="checkbox" checked></td><td><span class="strat-name">Квазар</span></td><td class="arrows"><span class="down">↓</span><span class="down">↓</span><span class="up">↑</span><span class="left">←</span><span class="right">→</span></td></tr>
            <tr><td><input type="checkbox" checked></td><td><span class="strat-name">Рюкзак С4</span></td><td class="arrows"><span class="down">↓</span><span class="left">←</span><span class="up">↑</span><span class="right">→</span><span class="down">↓</span></td></tr>
        </tbody>
    </table>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // Развернуть на всё окно
    
    // Настраиваем главную кнопку Telegram
    tg.MainButton.setText("ПРИМЕНИТЬ ВЫБОР");
    tg.MainButton.show();
    tg.MainButton.setParams({
        button_color: "#ffe81f",
        button_text_color: "#000000"
    });

    tg.MainButton.onClick(function() {
        applyFilter();
        tg.HapticFeedback.impactOccurred('heavy'); // Вибрация при активации
    });

    function applyFilter() {
        const rows = document.querySelectorAll('#stratTable tbody tr');
        rows.forEach(row => {
            if (!row.classList.contains('cat-row')) {
                const cb = row.querySelector('input');
                row.classList.toggle('hidden', !cb.checked);
            }
        });

        const allRows = Array.from(rows);
        for (let i = 0; i < allRows.length; i++) {
            if (allRows[i].classList.contains('cat-row')) {
                let j = i + 1;
                let hasVisible = false;
                while (j < allRows.length && !allRows[j].classList.contains('cat-row')) {
                    if (!allRows[j].classList.contains('hidden')) { hasVisible = true; break; }
                    j++;
                }
                allRows[i].classList.toggle('hidden', !hasVisible);
            }
        }
    }

    function resetFilter() {
        document.querySelectorAll('#stratTable tr').forEach(r => r.classList.remove('hidden'));
        tg.HapticFeedback.impactOccurred('light');
    }

    function clearAll() {
        document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
        tg.HapticFeedback.notificationOccurred('warning');
    }

    // Подстройка цветов под тему Telegram
    tg.onEvent('themeChanged', function() {
        document.body.style.backgroundColor = tg.themeParams.bg_color;
        document.body.style.color = tg.themeParams.text_color;
    });
</script>

</body>
</html>
